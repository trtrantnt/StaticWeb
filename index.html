<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bo suu tap 1-9</title>
  <meta name="description" content="Website hien thi 9 anh tu 1 den 9 voi bo cuc de chiu, toi gian, de nhin." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #f6efe6;
      --bg-2: #f7f4ee;
      --card: #fffefb;
      --text: #2c241b;
      --muted: #6c5f52;
      --accent: #a4633d;
      --ring: rgba(164, 99, 61, 0.28);
      --shadow: 0 16px 40px rgba(66, 42, 23, 0.12);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 10%, rgba(255, 255, 255, 0.72), transparent 50%),
        radial-gradient(circle at 85% 0%, rgba(243, 207, 167, 0.35), transparent 35%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
      overflow-x: hidden;
    }

    .texture {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.08;
      background-image: radial-gradient(#8f7d6c 1px, transparent 1px);
      background-size: 18px 18px;
    }

    .container {
      width: min(1100px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 3.2rem 0 3rem;
      position: relative;
      z-index: 1;
    }

    .hero {
      text-align: center;
      margin-bottom: 2rem;
      animation: rise 700ms ease-out both;
    }

    .hero h1 {
      margin: 0;
      font-family: "Playfair Display", serif;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.15;
      letter-spacing: 0.3px;
    }

    .hero p {
      margin: 0.8rem auto 0;
      color: var(--muted);
      max-width: 720px;
      line-height: 1.7;
      font-size: 1rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
    }

    .card {
      margin: 0;
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid rgba(164, 99, 61, 0.14);
      box-shadow: var(--shadow);
      transform: translateY(14px);
      opacity: 0;
      animation: reveal 700ms ease-out forwards;
    }

    .card:nth-child(1) { animation-delay: 80ms; }
    .card:nth-child(2) { animation-delay: 140ms; }
    .card:nth-child(3) { animation-delay: 200ms; }
    .card:nth-child(4) { animation-delay: 260ms; }
    .card:nth-child(5) { animation-delay: 320ms; }
    .card:nth-child(6) { animation-delay: 380ms; }
    .card:nth-child(7) { animation-delay: 440ms; }
    .card:nth-child(8) { animation-delay: 500ms; }
    .card:nth-child(9) { animation-delay: 560ms; }

    .frame {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      background: #f4ede2;
    }

    .frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 450ms ease, filter 450ms ease;
    }

    .badge {
      position: absolute;
      left: 0.65rem;
      top: 0.65rem;
      background: rgba(44, 36, 27, 0.8);
      color: #fff;
      font-weight: 700;
      font-size: 0.82rem;
      line-height: 1;
      padding: 0.5rem 0.55rem;
      border-radius: 999px;
      backdrop-filter: blur(2px);
    }

    figcaption {
      padding: 0.82rem 0.95rem 0.95rem;
      font-size: 0.93rem;
      color: var(--muted);
      border-top: 1px solid rgba(164, 99, 61, 0.1);
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      align-items: center;
    }

    .caption-title {
      font-weight: 700;
      color: var(--text);
      font-size: 0.95rem;
    }

    .card:hover,
    .card:focus-within {
      outline: 2px solid var(--ring);
      outline-offset: 2px;
    }

    .card:hover .frame img,
    .card:focus-within .frame img {
      transform: scale(1.06);
      filter: saturate(1.04) contrast(1.03);
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      animation: rise 900ms ease-out both;
    }

    @keyframes reveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      .gallery {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .container {
        width: min(100%, calc(100% - 1.1rem));
        padding-top: 2.2rem;
      }

      .gallery {
        grid-template-columns: 1fr;
        gap: 0.85rem;
      }

      .hero p {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
